# need 4 gpus
# Internalize CoT: curriculum learning that progressively removes CoT steps
# without latent token replacement, forcing the model to internalize reasoning.

project: coconut
save_path: YOUR_PATH_TO_SAVE_THE_MODEL
name: prosqa-internalize

only_eval: False

coconut: False
cot: False
no_thoughts: False
no_cot: False
internalize_cot: True

c_thought: 0
epochs_per_stage: 5
max_latent_stage: 6
pad_latent_to_max: False

save_only_improve: False
uniform_prob: 0.0
model_id: openai-community/gpt2
load_model_path: YOUR_PATH_TO_SAVE_THE_MODEL/prosqa-internalize/checkpoint_20
seed: 0
resume: 10
bf16: False
train_path: data/prosqa_train.json
val_path: data/prosqa_valid.json
reset_optimizer: True
batch_size_training: 16
debug: False
gradient_accumulation_steps: 8
num_epochs: 50
lr: !!float "1e-4"
weight_decay: 0.01
